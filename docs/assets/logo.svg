<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- ECTLogger logo: radar rings + Yagi antenna + check-in dots + checkmark -->
  <!-- Canonical reference copy — see docs/DESIGN.md for usage guidelines -->

  <!-- Outer circle border -->
  <circle cx="100" cy="100" r="92" fill="white" stroke="#1a6b2e" stroke-width="9"/>

  <!-- Concentric radar rings -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#b2dfb2" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="47" fill="none" stroke="#b2dfb2" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="26" fill="none" stroke="#b2dfb2" stroke-width="1.5"/>

  <!-- Antenna mast (vertical pole) -->
  <line x1="100" y1="165" x2="100" y2="38" stroke="#90a4ae" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Yagi crossbars -->
  <line x1="88"  y1="58"  x2="112" y2="58"  stroke="#90a4ae" stroke-width="3"   stroke-linecap="round"/>
  <line x1="84"  y1="74"  x2="116" y2="74"  stroke="#78909c" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Antenna node dots -->
  <circle cx="100" cy="38"  r="5.5" fill="#4caf50"/>
  <circle cx="100" cy="100" r="4"   fill="#78909c"/>
  <circle cx="100" cy="165" r="4"   fill="#78909c"/>

  <!-- Station check-in dots scattered around rings -->
  <circle cx="152" cy="72"  r="5.5" fill="#4caf50"/>
  <circle cx="56"  cy="62"  r="5.5" fill="#4caf50"/>
  <circle cx="48"  cy="138" r="5.5" fill="#4caf50"/>
  <circle cx="155" cy="130" r="4"   fill="#81c784" opacity="0.7"/>
  <circle cx="100" cy="32"  r="4"   fill="#81c784" opacity="0.7"/>

  <!-- Bold green checkmark (shadow layer + highlight layer) -->
  <path d="M 52 112 L 84 148 L 162 58" fill="none" stroke="#2e7d32" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 52 112 L 84 148 L 162 58" fill="none" stroke="#43a047" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
